<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      color: #ff4d6d;
    }

    input, button {
      padding: 8px;
      margin: 5px;
    }

    #users p {
      cursor: pointer;
      background: white;
      padding: 8px;
      border-radius: 5px;
      margin: 5px 0;
    }

    #users p:hover {
      background: #ffe0e6;
    }

    #chat {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<h1>💖 Dating App</h1>

<input id="name" placeholder="Enter your name">
<button onclick="addUser()">Enter</button>

<h2>Users</h2>
<div id="users"></div>

<hr>

<h2>Chat</h2>
<div id="chatWith"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5mWexTkc05_NNEBo6Kore8Ur1YtC6cU",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";
let unsubscribeChat = null;

// ADD USER (NO DUPLICATE)
function addUser() {
  let name = document.getElementById("name").value.trim();

  if (name === "") {
    alert("Enter name!");
    return;
  }

  currentUser = name;

  db.collection("users")
    .where("name", "==", name)
    .get()
    .then(snapshot => {
      if (snapshot.empty) {
        db.collection("users").add({ name: name });
      }
      alert("Entered as " + name);
    });
}

// REALTIME USERS
db.collection("users").onSnapshot(snapshot => {
  let usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let user = doc.data().name;

    if (user !== currentUser) {
      usersDiv.innerHTML += `
        <p onclick="selectUser('${user}')">${user}</p>
      `;
    }
  });
});

// SELECT USER
function selectUser(user) {
  selectedUser = user;
  document.getElementById("chatWith").innerText = "Chat with: " + user;

  loadChat();
}

// SEND MESSAGE (WITH TIME + VALIDATION)
function sendMsg() {
  let msgInput = document.getElementById("msg");
  let msg = msgInput.value.trim();

  if (!selectedUser) {
    alert("Select user first!");
    return;
  }

  if (msg === "") return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    time: Date.now()
  });

  msgInput.value = "";
}

// LOAD CHAT (ORDERED + FIX MULTIPLE LISTENERS)
function loadChat() {

  // previous listener stop karo
  if (unsubscribeChat) unsubscribeChat();

  unsubscribeChat = db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        if (
          (m.from === currentUser && m.to === selectedUser) ||
          (m.from === selectedUser && m.to === currentUser)
        ) {
          chatDiv.innerHTML += `<p><b>${m.from}:</b> ${m.text}</p>`;
        }
      });

      // auto scroll down
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}
</script>

</body>
</html>
