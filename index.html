
<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    h1 { color: #ff4d6d; }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    #users p {
      background: white;
      padding: 8px;
      cursor: pointer;
      margin: 5px 0;
    }

    #chat {
      background: white;
      padding: 10px;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<h1>💖 Dating App</h1>

<input id="name" placeholder="Enter your name">
<button onclick="addUser()">Enter</button>

<h2>Users</h2>
<div id="users"></div>

<hr>

<h2 id="chatWith"></h2>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5mWexTkc05_NNEBo6Kore8Ur1YtC6cU",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";

// ADD USER
function addUser() {
  let name = document.getElementById("name").value.trim();
  if (!name) return alert("Enter name!");

  currentUser = name;

  db.collection("users").add({
    name: name
  });

  alert("Welcome " + name);
}

// SHOW USERS (WORKING)
db.collection("users").onSnapshot(snapshot => {
  let usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let user = doc.data().name;

    if (user !== currentUser) {
      usersDiv.innerHTML += `
        <p onclick="selectUser('${user}')">${user}</p>
      `;
    }
  });
});

// SELECT USER
function selectUser(user) {
  selectedUser = user;
  document.getElementById("chatWith").innerText = "Chat with: " + user;
  loadChat();
}

// SEND MESSAGE
function sendMsg() {
  let msg = document.getElementById("msg").value.trim();

  if (!selectedUser) return alert("Select user first!");
  if (!msg) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

// CHAT (SORTED)
function loadChat() {
  db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        if (
          (m.from === currentUser && m.to === selectedUser) ||
          (m.from === selectedUser && m.to === currentUser)
        ) {
          chatDiv.innerHTML += `<p><b>${m.from}:</b> ${m.text}</p>`;
        }
      });
    });
}
</script>

</body>
</html>
