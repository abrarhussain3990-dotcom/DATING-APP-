<script>

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";
let unsubscribeChat = null;

// TIME
function formatTime(ts) {
  let d = new Date(ts);
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
}

// ADD USER
function addUser() {
  let name = document.getElementById("name").value.trim();
  if (!name) return alert("Enter name!");

  db.collection("users").doc(name).set({
    name,
    online: true,
    lastSeen: Date.now()
  });

  currentUser = name;
  document.getElementById("name").disabled = true;

  // keep online active
  setInterval(() => {
    db.collection("users").doc(currentUser).update({
      online: true,
      lastSeen: Date.now()
    });
  }, 5000);

  alert("Welcome " + name);
}

// OFFLINE
window.addEventListener("beforeunload", () => {
  if (currentUser) {
    db.collection("users").doc(currentUser).update({
      online: false,
      lastSeen: Date.now()
    });
  }
});

// USERS (FIXED)
db.collection("users").onSnapshot(snapshot => {
  let usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let u = doc.data();

    if (u.name !== currentUser) {

      let status = u.online
        ? `<span class="online">Online</span>`
        : `<span class="offline">Last seen: ${formatTime(u.lastSeen)}</span>`;

      usersDiv.innerHTML += `
        <div onclick="selectUser('${u.name}')">
          <b>${u.name}</b><br>
          ${status}<br>
          <small id="last-${u.name}"></small>
        </div>
      `;

      // SAFE last message
      db.collection("messages")
        .orderBy("time", "desc")
        .limit(20)
        .get()
        .then(snap => {
          let lastMsg = "";

          snap.forEach(m => {
            let d = m.data();
            if (
              (d.from === currentUser && d.to === u.name) ||
              (d.from === u.name && d.to === currentUser)
            ) {
              if (!lastMsg) lastMsg = d.text;
            }
          });

          let el = document.getElementById(`last-${u.name}`);
          if (el) el.innerText = lastMsg;
        });
    }
  });
});

// SELECT USER
function selectUser(user) {
  selectedUser = user;
  document.getElementById("chatWith").innerText = "Chat with: " + user;
  loadChat();
}

// TYPING
document.getElementById("msg").addEventListener("input", () => {
  if (!selectedUser) return;

  db.collection("typing").doc(currentUser + "_" + selectedUser).set({
    from: currentUser,
    to: selectedUser,
    typing: true
  });

  setTimeout(() => {
    db.collection("typing").doc(currentUser + "_" + selectedUser).update({
      typing: false
    });
  }, 1000);
});
