
<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      color: #ff4d6d;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff4d6d;
      color: white;
      border: none;
      cursor: pointer;
    }

    #users p {
      cursor: pointer;
      background: white;
      padding: 10px;
      border-radius: 8px;
      margin: 5px 0;
    }

    #users p:hover {
      background: #ffe0e6;
    }

    #chat {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 10px;
      max-width: 60%;
    }

    .me {
      background: #ff4d6d;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: #e4e6eb;
      align-self: flex-start;
    }
  </style>
</head>

<body>

<h1>💖 Dating App</h1>

<input id="name" placeholder="Enter your name">
<button onclick="addUser()">Enter</button>

<h2>Users</h2>
<div id="users"></div>

<hr>

<h2 id="chatWith">Select a user</h2>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5mWexTkc05_NNEBo6Kore8Ur1YtC6cU",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";
let unsubscribeChat = null;

// ADD USER (LOCK NAME + NO DUPLICATE)
function addUser() {
  let nameInput = document.getElementById("name");
  let name = nameInput.value.trim();

  if (name === "") {
    alert("Enter name!");
    return;
  }

  if (currentUser) {
    alert("Already logged in!");
    return;
  }

  db.collection("users")
    .where("name", "==", name)
    .get()
    .then(snapshot => {
      if (snapshot.empty) {
        db.collection("users").add({ name: name });
      }
      currentUser = name;
      nameInput.disabled = true;
      alert("Welcome " + name);
    });
}

// REALTIME USERS
db.collection("users").onSnapshot(snapshot => {
  let usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let user = doc.data().name;

    if (user !== currentUser) {
      usersDiv.innerHTML += `
        <p onclick="selectUser('${user}')">${user}</p>
      `;
    }
  });
});

// SELECT USER
function selectUser(user) {
  selectedUser = user;
  document.getElementById("chatWith").innerText = "Chat with: " + user;
  loadChat();
}

// SEND MESSAGE
function sendMsg() {
  let msgInput = document.getElementById("msg");
  let msg = msgInput.value.trim();

  if (!currentUser) {
    alert("Enter your name first!");
    return;
  }

  if (!selectedUser) {
    alert("Select user first!");
    return;
  }

  if (msg === "") return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    time: Date.now()
  });

  msgInput.value = "";
}

// ENTER KEY SEND
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMsg();
  }
});

// LOAD CHAT
function loadChat() {

  if (unsubscribeChat) unsubscribeChat();

  unsubscribeChat = db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        if (
          (m.from === currentUser && m.to === selectedUser) ||
          (m.from === selectedUser && m.to === currentUser)
        ) {
          let className = m.from === currentUser ? "me" : "other";

          chatDiv.innerHTML += `
            <div class="msg ${className}">
              ${m.text}
            </div>
          `;
        }
      });

      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}
</script>

</body>
</html>
