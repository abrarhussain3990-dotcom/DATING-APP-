<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    h1 { color: #ff4d6d; }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    #users p {
      background: white;
      padding: 8px;
      cursor: pointer;
      margin: 5px 0;
      border-radius: 5px;
    }

    #chat {
      background: white;
      padding: 10px;
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border-radius: 5px;
    }

    .msg {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 10px;
      max-width: 60%;
    }

    .me {
      background: #ff4d6d;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: #e4e6eb;
      align-self: flex-start;
    }

    .time {
      font-size: 10px;
      opacity: 0.7;
      display: block;
      margin-top: 3px;
    }
  </style>
</head>

<body>

<h1>💖 Dating App</h1>

<input id="name" placeholder="Enter your name">
<button onclick="addUser()">Enter</button>

<h2>Users</h2>
<div id="users"></div>

<hr>

<h2 id="chatWith">Select user</h2>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5mWexTkc05_NNEBo6Kore8Ur1YtC6cU",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";
let unsubscribeChat = null;

// TIME FORMAT
function formatTime(ts) {
  let d = new Date(ts);
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
}

// ADD USER (NO DUPLICATE + LOCK)
function addUser() {
  let nameInput = document.getElementById("name");
  let name = nameInput.value.trim();

  if (!name) return alert("Enter name!");

  if (currentUser) {
    alert("Already entered!");
    return;
  }

  currentUser = name;

  db.collection("users")
    .where("name", "==", name)
    .get()
    .then(snapshot => {
      if (snapshot.empty) {
        db.collection("users").add({ name: name });
      }
      alert("Welcome " + name);
    });

  nameInput.disabled = true;
}

// SHOW USERS (REALTIME)
db.collection("users").onSnapshot(snapshot => {
  let usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let user = doc.data().name;

    if (user !== currentUser) {
      usersDiv.innerHTML += `
        <p onclick="selectUser('${user}')">${user}</p>
      `;
    }
  });
});

// SELECT USER
function selectUser(user) {
  selectedUser = user;
  document.getElementById("chatWith").innerText = "Chat with: " + user;
  loadChat();
}

// SEND MESSAGE
function sendMsg() {
  let msgInput = document.getElementById("msg");
  let msg = msgInput.value.trim();

  if (!selectedUser) return alert("Select user first!");
  if (!msg) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    time: Date.now()
  });

  msgInput.value = "";
}

// ENTER KEY SEND
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMsg();
  }
});

// CHAT (FIXED LISTENER BUG)
function loadChat() {

  // ❗ old listener stop
  if (unsubscribeChat) unsubscribeChat();

  unsubscribeChat = db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        if (
          (m.from === currentUser && m.to === selectedUser) ||
          (m.from === selectedUser && m.to === currentUser)
        ) {
          let cls = m.from === currentUser ? "me" : "other";

          chatDiv.innerHTML += `
            <div class="msg ${cls}">
              ${m.text}
              <span class="time">${formatTime(m.time)}</span>
            </div>
          `;
        }
      });

      // auto scroll
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}
</script>

</body>
</html>
